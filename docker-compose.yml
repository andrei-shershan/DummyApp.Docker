version: '3.9'

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/traefik/certs:ro
      - ./traefik-dynamic.yml:/etc/traefik/dynamic/tls.yml:ro
    networks:
      web:
        aliases:
          - apigateway.dummy.localhost
          - storage.dummy.localhost
          - identity.dummy.localhost
          - bff.dummy.localhost
          - fe.dummy.localhost

  api-gateway:
    build:
      context: ../DummyApp.ApiGateway
      dockerfile: Dockerfile
    environment:
      - ReverseProxy__TrustAllProxies=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=Host(`apigateway.dummy.localhost`)"
      - "traefik.http.routers.api-gateway.entrypoints=websecure"
      - "traefik.http.routers.api-gateway.tls=true"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=8080"
    networks:
      - web

  bff:
    build:
      context: ../DummyApp.BFF
      dockerfile: Dockerfile
    environment:
      - ReverseProxy__TrustAllProxies=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff.rule=Host(`bff.dummy.localhost`)"
      - "traefik.http.routers.bff.entrypoints=websecure"
      - "traefik.http.routers.bff.tls=true"
      - "traefik.http.services.bff.loadbalancer.server.port=8080"
    networks:
      - web

  identity:
    build:
      context: ../DummyApp.Identity
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__TrustAllProxies=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.identity.rule=Host(`identity.dummy.localhost`)"
      - "traefik.http.routers.identity.entrypoints=websecure"
      - "traefik.http.routers.identity.tls=true"
      - "traefik.http.services.identity.loadbalancer.server.port=8080"
    networks:
      - web

  storage:
    build:
      context: ../DummyApp.StorageService
      dockerfile: Dockerfile
    environment:
      - ReverseProxy__TrustAllProxies=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storage.rule=Host(`storage.dummy.localhost`)"
      - "traefik.http.routers.storage.entrypoints=websecure"
      - "traefik.http.routers.storage.tls=true"
      - "traefik.http.services.storage.loadbalancer.server.port=8080"
    networks:
      - web

  frontend:
    build:
      context: ../DummyApp.FE/dummyappfe
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`fe.dummy.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - web

networks:
  web:
    driver: bridge
